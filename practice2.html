<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Major vs Minor Practice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #efefef;
      margin: 0;
      padding: 24px;
      text-align: center;
    }

    .app {
      max-width: 700px;
      margin: 0 auto;
    }

    .panel {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    button {
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      font-size: 1rem;
      margin: 6px;
    }

    .primary {
      background: #2d8be6;
      color: white;
      border: none;
    }

    .choices button {
      min-width: 120px;
    }

    #questionLabel {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 14px;
    }

    #feedback {
      margin-top: 12px;
      font-weight: bold;
      min-height: 24px;
    }

    #result {
      font-size: 1.3rem;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="nav-link-wrap">
      <a class="nav-link" href="lesson.html">← Back to Lesson</a>
    </div>
    
    <h1>Major vs Minor</h1>

    <div class="panel">
      <div id="questionLabel">Question 1 of 10</div>

      <button class="primary" id="playBtn">Play Chord</button>

      <div class="choices" id="choiceWrap">
        <button onclick="answer('Major')">Major</button>
        <button onclick="answer('Minor')">Minor</button>
      </div>

      <div id="feedback"></div>

      <div id="nextWrap" class="hidden">
        <button class="primary" id="nextBtn">Next</button>
      </div>
    </div>

    <div class="panel">
      <div id="progress"></div>
      <div id="result"></div>
      <div id="endButtons"></div>
    </div>
  </div>

  <script>
    const noteToMidi = {
      C4:60,"C#4":61,Db4:61,D4:62,"D#4":63,Eb4:63,E4:64,F4:65,
      "F#4":66,Gb4:66,G4:67,"G#4":68,Ab4:68,A4:69,"A#4":70,Bb4:70,B4:71,
      C5:72,"C#5":73,Db5:73,D5:74,"D#5":75,Eb5:75,E5:76,F5:77,
      "F#5":78,Gb5:78,G5:79,"G#5":80,Ab5:80,A5:81,"A#5":82,Bb5:82,B5:83
    };

    const ALL_QUESTIONS = [
      {notes:["C4","E4","G4"], type:"Major"},
      {notes:["D4","F#4","A4"], type:"Major"},
      {notes:["E4","G#4","B4"], type:"Major"},
      {notes:["F4","A4","C5"], type:"Major"},
      {notes:["G4","B4","D5"], type:"Major"},

      {notes:["C4","Eb4","G4"], type:"Minor"},
      {notes:["D4","F4","A4"], type:"Minor"},
      {notes:["E4","G4","B4"], type:"Minor"},
      {notes:["F4","Ab4","C5"], type:"Minor"},
      {notes:["G4","Bb4","D5"], type:"Minor"}
    ];

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    let questions = [];
    let index = 0;
    let score = 0;
    let audioCtx = null;
    let answered = false;

    const questionLabel = document.getElementById("questionLabel");
    const progress = document.getElementById("progress");
    const feedback = document.getElementById("feedback");
    const result = document.getElementById("result");
    const choiceWrap = document.getElementById("choiceWrap");
    const nextWrap = document.getElementById("nextWrap");
    const nextBtn = document.getElementById("nextBtn");
    const endButtons = document.getElementById("endButtons");
    const playBtn = document.getElementById("playBtn");

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function midiToFreq(m) {
      return 440 * Math.pow(2, (m - 69) / 12);
    }

    function playChord(notes) {
      ensureAudio();
      notes.forEach(n => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";
        osc.frequency.value = midiToFreq(noteToMidi[n]);

        gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.35, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 1.2);
      });
    }

    function currentQuestion() {
      return questions[index];
    }

    function updateUI() {
      questionLabel.textContent = `Question ${index + 1} of 10`;
      progress.textContent = `Score: ${score} / 10`;
    }

    function answer(choice) {
      if (answered) return;

      const correct = currentQuestion().type;
      answered = true;

      if (choice === correct) {
        score++;
        feedback.textContent = "Correct";
        feedback.style.color = "green";
      } else {
        feedback.textContent = `Wrong. Correct answer: ${correct}`;
        feedback.style.color = "red";
      }

      progress.textContent = `Score: ${score} / 10`;
      choiceWrap.classList.add("hidden");
      nextWrap.classList.remove("hidden");
    }

    function goNext() {
      index++;

      if (index >= 10) {
        finish();
        return;
      }

      answered = false;
      feedback.textContent = "";
      choiceWrap.classList.remove("hidden");
      nextWrap.classList.add("hidden");
      updateUI();
    }

    function finish() {
      const passed = score >= 8;

      questionLabel.textContent = "Module Complete";
      choiceWrap.classList.add("hidden");
      nextWrap.classList.add("hidden");

      progress.textContent = `Final Score: ${score} / 10`;
      result.textContent = passed
        ? "Passed! You can move on to Augmented / Diminished."
        : "You did not pass. You need 8 out of 10 to continue.";

      endButtons.innerHTML = "";

      if (passed) {
        const nextModuleBtn = document.createElement("button");
        nextModuleBtn.className = "primary";
        nextModuleBtn.textContent = "Next Module";
        endButtons.appendChild(nextModuleBtn);
      } else {
        const restartBtn = document.createElement("button");
        restartBtn.className = "primary";
        restartBtn.textContent = "Restart";
        restartBtn.onclick = startModule;
        endButtons.appendChild(restartBtn);
      }
    }

    function startModule() {
      questions = shuffle(ALL_QUESTIONS);
      index = 0;
      score = 0;
      answered = false;

      feedback.textContent = "";
      result.textContent = "";
      endButtons.innerHTML = "";
      choiceWrap.classList.remove("hidden");
      nextWrap.classList.add("hidden");

      updateUI();
    }

    playBtn.onclick = () => {
      if (index < questions.length) {
        playChord(currentQuestion().notes);
      }
    };

    nextBtn.onclick = goNext;

    startModule();
  </script>
</body>
</html>
