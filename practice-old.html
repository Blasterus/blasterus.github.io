<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triad Practice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #efefef;
      color: #222;
      margin: 0;
      padding: 24px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 2.2rem;
    }

    .subtitle {
      margin-bottom: 24px;
      color: #555;
    }

    .visual-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 28px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .panel {
      background: #fff;
      border: 1px solid #d8d8d8;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    #staffPanel {
      width: 420px;
      position: relative;
    }

    #pianoPanel {
      width: 430px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .control-btn {
      font-size: 0.95rem;
      border-radius: 10px;
      border: 1px solid #cfcfcf;
      padding: 10px 14px;
      background: #ffffff;
      cursor: pointer;
    }

    .answer-wrap {
      background: #fff;
      border: 1px solid #d8d8d8;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      max-width: 760px;
      margin: 0 auto;
    }

    .answer-title {
      font-size: 2rem;
      margin: 0 0 16px;
    }

    .selectors {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    select, button, .nav-btn {
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #cfcfcf;
      padding: 12px 14px;
      background: #ffffff;
    }

    .submit-btn {
      background: #2d8be6;
      color: white;
      border: none;
      cursor: pointer;
      min-width: 120px;
    }

    #feedback {
      min-height: 30px;
      margin-top: 12px;
      font-size: 1.05rem;
      font-weight: bold;
    }

    .nav-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 14px;
      font-size: 0.95rem;
      color: #444;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .blue { background: #2d8be6; }
    .gold { background: #f2b632; }

    .nav-link-wrap {
      margin-bottom: 18px;
      text-align: left;
    }

    .nav-link {
      display: inline-block;
      background: #2d8be6;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      h1 { font-size: 1.8rem; }
      .answer-title { font-size: 1.6rem; }
      #staffPanel, #pianoPanel { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="nav-link-wrap">
      <a class="nav-link" href="lesson.html">← Back to Lesson</a>
    </div>

    <h1>Triad Practice</h1>
    <div class="subtitle">Listen to the chord, read the notation, and identify the triad.</div>

    <div class="visual-row">
      <div id="staffPanel" class="panel">
        <svg id="staffSvg" width="388" height="190" viewBox="0 0 388 190"></svg>
        <div class="controls">
          <button class="control-btn" id="playChordBtn">Play Chord</button>
          <button class="control-btn" id="playNotesBtn">Play Individual Notes</button>
        </div>
      </div>
      <div id="pianoPanel" class="panel">
        <svg id="pianoSvg" width="398" height="190" viewBox="0 0 398 190"></svg>
      </div>
    </div>

    <div class="answer-wrap">
      <div class="answer-title">Answer</div>

      <div class="selectors">
        <select id="letterSelect">
          <option value="">Note</option>
          <option>C</option>
          <option>D</option>
          <option>E</option>
          <option>F</option>
          <option>G</option>
          <option>A</option>
          <option>B</option>
        </select>

        <select id="accidentalSelect">
          <option value="">Natural</option>
          <option value="b">Flat</option>
          <option value="#">Sharp</option>
        </select>

        <select id="qualitySelect">
          <option value="">Quality</option>
          <option>Major</option>
          <option>Minor</option>
        </select>

        <button class="submit-btn" id="submitBtn">Submit</button>
      </div>

      <div id="feedback"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn">Previous</button>
      <span id="progressLabel"></span>
      <button class="nav-btn" id="nextBtn">Next</button>
    </div>

    <div class="legend">
      <div><span class="dot blue"></span>Chord notes</div>
      <div><span class="dot gold"></span>Root</div>
    </div>
  </div>

  <script>
    const BLUE = "#2d8be6";
    const GOLD = "#f2b632";

    const noteToMidi = {
      C4: 60, "C#4": 61, Db4: 61, D4: 62, "D#4": 63, Eb4: 63, E4: 64, F4: 65, "F#4": 66, Gb4: 66,
      G4: 67, "G#4": 68, Ab4: 68, A4: 69, "A#4": 70, Bb4: 70, B4: 71,
      C5: 72, "C#5": 73, Db5: 73, D5: 74, "D#5": 75, Eb5: 75, E5: 76, F5: 77, "F#5": 78, Gb5: 78,
      G5: 79, "G#5": 80, Ab5: 80, A5: 81, "A#5": 82, Bb5: 82, B5: 83
    };

    const questionBank = [
      { displayRoot: "C", quality: "Major", root: "C4", notes: ["C4", "E4", "G4"] },
      { displayRoot: "Db", quality: "Major", root: "Db4", notes: ["Db4", "F4", "Ab4"] },
      { displayRoot: "D", quality: "Major", root: "D4", notes: ["D4", "F#4", "A4"] },
      { displayRoot: "Eb", quality: "Major", root: "Eb4", notes: ["Eb4", "G4", "Bb4"] },
      { displayRoot: "E", quality: "Major", root: "E4", notes: ["E4", "G#4", "B4"] },
      { displayRoot: "F", quality: "Major", root: "F4", notes: ["F4", "A4", "C5"] },
      { displayRoot: "Gb", quality: "Major", root: "Gb4", notes: ["Gb4", "Bb4", "Db5"] },
      { displayRoot: "G", quality: "Major", root: "G4", notes: ["G4", "B4", "D5"] },
      { displayRoot: "Ab", quality: "Major", root: "Ab4", notes: ["Ab4", "C5", "Eb5"] },
      { displayRoot: "A", quality: "Major", root: "A4", notes: ["A4", "C#5", "E5"] },
      { displayRoot: "Bb", quality: "Major", root: "Bb4", notes: ["Bb4", "D5", "F5"] },
      { displayRoot: "B", quality: "Major", root: "B4", notes: ["B4", "D#5", "F#5"] },

      { displayRoot: "C", quality: "Minor", root: "C4", notes: ["C4", "Eb4", "G4"] },
      { displayRoot: "C#", quality: "Minor", root: "C#4", notes: ["C#4", "E4", "G#4"] },
      { displayRoot: "D", quality: "Minor", root: "D4", notes: ["D4", "F4", "A4"] },
      { displayRoot: "Eb", quality: "Minor", root: "Eb4", notes: ["Eb4", "Gb4", "Bb4"] },
      { displayRoot: "E", quality: "Minor", root: "E4", notes: ["E4", "G4", "B4"] },
      { displayRoot: "F", quality: "Minor", root: "F4", notes: ["F4", "Ab4", "C5"] },
      { displayRoot: "F#", quality: "Minor", root: "F#4", notes: ["F#4", "A4", "C#5"] },
      { displayRoot: "G", quality: "Minor", root: "G4", notes: ["G4", "Bb4", "D5"] },
      { displayRoot: "G#", quality: "Minor", root: "G#4", notes: ["G#4", "B4", "D#5"] },
      { displayRoot: "A", quality: "Minor", root: "A4", notes: ["A4", "C5", "E5"] },
      { displayRoot: "Bb", quality: "Minor", root: "Bb4", notes: ["Bb4", "Db5", "F5"] },
      { displayRoot: "B", quality: "Minor", root: "B4", notes: ["B4", "D5", "F#5"] }
    ];

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const shuffledQuestions = shuffleArray(questionBank);

    const staffSvg = document.getElementById("staffSvg");
    const pianoSvg = document.getElementById("pianoSvg");
    const feedback = document.getElementById("feedback");
    const progressLabel = document.getElementById("progressLabel");
    const playChordBtn = document.getElementById("playChordBtn");
    const playNotesBtn = document.getElementById("playNotesBtn");
    const submitBtn = document.getElementById("submitBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const letterSelect = document.getElementById("letterSelect");
    const accidentalSelect = document.getElementById("accidentalSelect");
    const qualitySelect = document.getElementById("qualitySelect");

    let currentIndex = 0;
    let audioCtx = null;

    function parseNote(note) {
      const m = note.match(/^([A-G])([#b]?)(\d)$/);
      return { letter: m[1], accidental: m[2] || "", octave: parseInt(m[3], 10) };
    }

    function noteStepIndex(noteName) {
      const order = ["C", "D", "E", "F", "G", "A", "B"];
      const n = parseNote(noteName);
      return n.octave * 7 + order.indexOf(n.letter);
    }

    function noteY(noteName) {
      const step = noteStepIndex(noteName);
      const e4 = noteStepIndex("E4");
      const spacing = 10;
      return 130 - ((step - e4) * (spacing / 2));
    }

    function drawStaff(notes, root) {
      const STAFF_TOP = 90;
      const STAFF_GAP = 10;
      const STAFF_BOTTOM = STAFF_TOP + STAFF_GAP * 4;
      const NOTE_X = 214;

      let html = `<rect x="0" y="0" width="388" height="190" rx="10" fill="#ffffff"></rect>`;

      for (let i = 0; i < 5; i++) {
        const y = STAFF_TOP + i * STAFF_GAP;
        html += `<line x1="36" y1="${y}" x2="350" y2="${y}" stroke="#333" stroke-width="1.2"></line>`;
      }

      html += `<text x="54" y="132" font-size="92" font-family="serif">𝄞</text>`;

      notes.forEach((note) => {
        const parsed = parseNote(note);
        const x = NOTE_X;
        const y = noteY(note);
        const color = note === root ? GOLD : BLUE;

        if (parsed.accidental) {
          const symbol = parsed.accidental === "#" ? "♯" : "♭";
          html += `<text x="${x - 18}" y="${y + 6}" font-size="28" font-family="serif" fill="#111">${symbol}</text>`;
        }

        if (y < STAFF_TOP) {
          for (let ly = STAFF_TOP - STAFF_GAP; ly >= y; ly -= STAFF_GAP) {
            html += `<line x1="${x - 16}" y1="${ly}" x2="${x + 16}" y2="${ly}" stroke="#333" stroke-width="1.2"></line>`;
          }
        }

        if (y > STAFF_BOTTOM) {
          for (let ly = STAFF_BOTTOM + STAFF_GAP; ly <= y; ly += STAFF_GAP) {
            html += `<line x1="${x - 16}" y1="${ly}" x2="${x + 16}" y2="${ly}" stroke="#333" stroke-width="1.2"></line>`;
          }
        }

        html += `<ellipse cx="${x}" cy="${y}" rx="8" ry="6" fill="none" stroke="${color}" stroke-width="2.4" transform="rotate(-20 ${x} ${y})"></ellipse>`;
      });

      staffSvg.innerHTML = html;
    }

    function createPianoData() {
      const whites = [
        { note: "C4" }, { note: "D4" }, { note: "E4" }, { note: "F4" }, { note: "G4" }, { note: "A4" }, { note: "B4" },
        { note: "C5" }, { note: "D5" }, { note: "E5" }, { note: "F5" }, { note: "G5" }, { note: "A5" }, { note: "B5" }
      ];

      const blacks = [
        { aliases: ["C#4", "Db4"], afterWhite: 0 },
        { aliases: ["D#4", "Eb4"], afterWhite: 1 },
        { aliases: ["F#4", "Gb4"], afterWhite: 3 },
        { aliases: ["G#4", "Ab4"], afterWhite: 4 },
        { aliases: ["A#4", "Bb4"], afterWhite: 5 },
        { aliases: ["C#5", "Db5"], afterWhite: 7 },
        { aliases: ["D#5", "Eb5"], afterWhite: 8 },
        { aliases: ["F#5", "Gb5"], afterWhite: 10 },
        { aliases: ["G#5", "Ab5"], afterWhite: 11 },
        { aliases: ["A#5", "Bb5"], afterWhite: 12 }
      ];

      return { whites, blacks };
    }

    function drawPiano(notes, root) {
      const { whites, blacks } = createPianoData();
      const whiteWidth = 26;
      const whiteHeight = 150;
      const blackWidth = 16;
      const blackHeight = 90;
      const startX = 18;
      const startY = 16;
      let html = `<rect x="0" y="0" width="398" height="190" rx="10" fill="#ffffff"></rect>`;

      whites.forEach((key, i) => {
        const x = startX + i * whiteWidth;
        const isActive = notes.includes(key.note);
        const isRoot = key.note === root;
        const fill = isRoot ? "#f7d06a" : (isActive ? BLUE : "#f8f8f8");
        html += `<rect x="${x}" y="${startY}" width="${whiteWidth}" height="${whiteHeight}" rx="4" fill="${fill}" stroke="#999"></rect>`;
      });

      blacks.forEach((key) => {
        const x = startX + (key.afterWhite + 1) * whiteWidth - (blackWidth / 2);
        const isActive = key.aliases.some(a => notes.includes(a));
        const isRoot = key.aliases.includes(root);
        const fill = isRoot ? GOLD : (isActive ? BLUE : "#33373d");
        html += `<rect x="${x}" y="${startY}" width="${blackWidth}" height="${blackHeight}" rx="3" fill="${fill}" stroke="#222"></rect>`;
      });

      pianoSvg.innerHTML = html;
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function playTone(noteName, startOffset = 0, duration = 1.2) {
      ensureAudio();
      const midi = noteToMidi[noteName];
      const freq = midiToFreq(midi);
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, now + startOffset);
      gain.gain.exponentialRampToValueAtTime(0.18, now + startOffset + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + startOffset + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + startOffset);
      osc.stop(now + startOffset + duration + 0.03);
    }

    function playChord(notes) {
      notes.forEach(note => playTone(note, 0, 1.25));
    }

    function playIndividualNotes(notes) {
      notes.forEach((note, i) => playTone(note, i * 0.55, 0.9));
    }

    function currentQuestion() {
      return shuffledQuestions[currentIndex];
    }

    function renderQuestion() {
      const q = currentQuestion();
      drawStaff(q.notes, q.root);
      drawPiano(q.notes, q.root);
      progressLabel.textContent = `Question ${currentIndex + 1} of ${shuffledQuestions.length}`;
      feedback.textContent = "";
      feedback.style.color = "#222";
      letterSelect.value = "";
      accidentalSelect.value = "";
      qualitySelect.value = "";
    }

    function checkAnswer() {
      const q = currentQuestion();
      const userRoot = letterSelect.value + accidentalSelect.value;
      const userQuality = qualitySelect.value;

      if (!letterSelect.value || !qualitySelect.value) {
        feedback.textContent = "Choose a note and quality first.";
        feedback.style.color = "#b03a2e";
        return;
      }

      if (userRoot === q.displayRoot && userQuality === q.quality) {
        feedback.textContent = `Correct! ${q.displayRoot} ${q.quality}`;
        feedback.style.color = "#1d7a35";
      } else {
        feedback.textContent = `Not quite. Correct answer: ${q.displayRoot} ${q.quality}`;
        feedback.style.color = "#b03a2e";
      }
    }

    playChordBtn.addEventListener("click", () => playChord(currentQuestion().notes));
    playNotesBtn.addEventListener("click", () => playIndividualNotes(currentQuestion().notes));
    submitBtn.addEventListener("click", checkAnswer);

    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % shuffledQuestions.length;
      renderQuestion();
    });

    prevBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + shuffledQuestions.length) % shuffledQuestions.length;
      renderQuestion();
    });

    renderQuestion();
  </script>
</body>
</html>
